<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>pocket-claude</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="themes.js"></script>
<style>
  :root {
    /* Theme colors (will be overridden by themes.js) */
    --bg: #1a1a1a;
    --surface: #252525;
    --surface2: #2a2a2a;
    --surface3: #333;
    --border: #3a3a3a;
    --border-soft: #2a2a2a;
    --border-input: #4a4a4a;
    --text: #e0e0e0;
    --text-muted: #ccc;
    --text-dim: #888;
    --text-darker: #666;
    --accent: #64B5F6;
    --accent-hover: rgba(100, 181, 246, 0.12);
    --accent-active: rgba(100, 181, 246, 0.18);
    --accent-bg: #1a2535;
    --primary: #1565C0;
    --primary-dark: #0D47A1;
    --purple: #a78bfa;
    --purple-hover: rgba(167, 139, 250, 0.12);
    --purple-active: rgba(167, 139, 250, 0.18);
    --green: #4CAF50;
    --green-user: #81C784;
    --green-user-bg: #1e2a1e;
    --orange: #FF9800;
    --red: #EF5350;
    --red-bg: #3a2020;
    --effort-border: #666;
    --effort-empty: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
  }

  /* ── 上部固定エリア ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
  }

  /* ── ヘッダー ── */
  #header {
    background: var(--surface);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--effort-empty);
    border: 1px solid transparent;
    flex-shrink: 0;
    transition: background 0.3s, width 0.3s, height 0.3s, border-radius 0.3s, padding 0.3s, border-color 0.3s;
  }
  #status-dot.connected { background: var(--green); }
  #status-dot.running   { background: var(--orange); animation: pulse 1.2s infinite; }
  #status-dot.disconnected {
    width: auto; height: auto;
    background: none;
    border: none;
    padding: 0;
    font-size: 14px;
    color: var(--red);
    cursor: pointer;
    text-align: center;
    line-height: 1;
  }
  #status-dot.disconnected:active { opacity: 0.6; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }


  #model-select {
    background: var(--surface3);
    color: var(--text-muted);
    border: 1px solid var(--border-input);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 14px;
    flex-shrink: 0;
    min-width: 32px;
    height: 30px;
    box-sizing: border-box;
    text-align: left;
    text-align-last: left;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  #model-select:hover {
    background: var(--border);
    border-color: var(--accent);
  }

  /* ── Effortインジケーター ── */
  #effort-indicator {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border-input);
    height: 30px;
    box-sizing: border-box;
    transition: background 0.2s, border-color 0.2s;
  }
  #effort-indicator:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
  }
  #effort-indicator:active { background: var(--border); }
  .effort-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--effort-border);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .effort-dot.filled { background: var(--accent); border-color: var(--accent); }

  /* ── Toggle switch ── */
  .settings-toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 2px;
  }
  .toggle-switch { position: relative; width: 40px; height: 22px; cursor: pointer; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--border-input); border-radius: 11px;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; left: 3px; top: 3px;
    background: var(--text-muted); border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); background: white; }
  .seg-control { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .seg-btn { flex: 1; padding: 6px 0; font-size: 12px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--text-muted); cursor: pointer; }
  .seg-btn:last-child { border-right: none; }
  .seg-btn.active { background: var(--accent-bg); color: var(--text); }
  .seg-btn:active { background: var(--border); }

  /* ── 設定ボタン ── */
  #settings-btn {
    background: transparent;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    min-width: 32px;
    height: 30px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }
  #settings-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
    color: var(--accent);
  }
  #settings-btn:active { background: var(--accent-active); }
  #settings-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── 設定モーダル ── */
  #settings-modal, #schedule-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #settings-modal.open, #schedule-modal.open { display: flex; }

  #settings-content, #schedule-content {
    background: var(--surface);
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #settings-header, #schedule-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #settings-header h3, #schedule-header h3 { font-size: 15px; color: var(--text); }
  #settings-close, #schedule-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
  }
  #settings-close:active, #schedule-close:active { color: var(--text-muted); }

  #settings-body, #schedule-body {
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  #schedule-body { gap: 0; }

  .settings-section-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  /* フォントサイズ */
  .font-size-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .font-size-row:last-child { margin-bottom: 0; }
  .font-size-label { font-size: 13px; color: var(--text-muted); }
  .font-size-ctrl { display: flex; align-items: center; gap: 8px; }
  .font-size-btn {
    background: var(--surface3); border: 1px solid var(--border-input); color: var(--text-muted);
    border-radius: 6px; width: 28px; height: 28px;
    font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .font-size-btn:active { background: var(--border); }
  .font-size-val { font-size: 13px; color: var(--text); min-width: 36px; text-align: center; }

  /* モデル設定 */
  .model-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    margin-bottom: 6px;
  }
  .model-row:last-child { margin-bottom: 0; }
  .model-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .model-row-name { flex: 1; font-size: 13px; color: var(--text-muted); }
  .model-row input[type="radio"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .model-row-default-label { font-size: 11px; color: var(--accent); margin-left: 2px; min-width: 44px; text-align: right; }

  /* Effort設定 */
  .effort-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .effort-option:last-child { margin-bottom: 0; }
  .effort-option:active { background: var(--border-soft); }
  .effort-option.selected { background: var(--accent-bg); }
  .effort-dots { display: flex; gap: 3px; flex-shrink: 0; }
  .effort-dots .d {
    width: 9px; height: 9px;
    border-radius: 50%;
    border: 1.5px solid var(--effort-empty);
    background: transparent;
  }
  .effort-dots .d.on { background: var(--accent); border-color: var(--accent); }
  .effort-option-label { font-size: 13px; color: var(--text-muted); flex: 1; }
  .effort-option.selected .effort-option-label { color: var(--text); }

  #stop-btn, #history-btn, #schedule-btn {
    background: none;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 32px;
    height: 30px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #stop-btn { color: var(--red); border-color: var(--red); opacity: 0.3; pointer-events: none; transition: background 0.2s, opacity 0.2s; }
  #stop-btn.running { opacity: 1; pointer-events: auto; }
  #stop-btn.running:hover { background: var(--red-bg); }
  #stop-btn:active { background: var(--red-bg); }

  #history-btn, #schedule-btn {
    color: var(--text-dim);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #schedule-btn { font-size: 14px; }
  #schedule-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
  #history-btn:hover, #schedule-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
    color: var(--accent);
  }
  #history-btn:active, #schedule-btn:active { background: var(--border); color: var(--text-muted); }
  #history-btn.active, #schedule-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── 履歴パネル ── */
  #history-panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 30;
    background: var(--bg);
    flex-direction: column;
  }
  #history-panel.open { display: flex; }

  #history-header {
    background: var(--surface);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #history-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
  }
  #history-back:active { background: var(--border-soft); }
  #history-title {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #history-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* 一覧 */
  .history-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    user-select: none;
  }
  .history-item:active { background: var(--surface); }
  .history-item-title {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .history-item-meta {
    font-size: 11px;
    color: var(--text-darker);
  }

  /* 詳細 */
  .history-msg {
    padding: 10px 14px;
    border-bottom: 1px solid var(--surface);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .history-msg-user { color: var(--green-user); background: var(--green-user-bg); }
  .history-msg-assistant { color: var(--text); }

  /* 再開ボタン */
  #resume-btn {
    margin: 20px 14px;
    padding: 14px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    width: calc(100% - 28px);
    text-align: center;
  }
  #resume-btn:active { background: var(--primary-dark); }

  /* ── プロジェクト ── */
  #projects-body {
    margin-bottom: 4px;
  }

  .project-item {
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .project-info {
    flex: 1;
    overflow: hidden;
  }

  .project-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .project-path {
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .project-remove {
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 10px;
  }
  .project-remove:active { background: var(--red-bg); }

  #project-add-form {
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  #project-add-form input {
    width: 100%;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border-input);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 10px;
  }

  #project-add-form input::placeholder {
    color: var(--text-darker);
  }

  #project-add-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  #project-add-btn:active { background: var(--primary-dark); }

  #project-error {
    color: var(--red);
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }

  #projects-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #projects-note.locked {
    color: var(--orange);
  }

  .project-item.current .project-name { color: var(--accent); }
  .project-item.locked { cursor: default; }
  .project-item:not(.locked):not(.current):hover { background: var(--border-soft); cursor: pointer; }

  .project-star {
    font-size: 16px;
    color: var(--effort-empty);
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .project-star.active { color: #fbbf24; }
  .project-star:hover { color: #fbbf24; opacity: 0.7; }

  /* ── タブバー ── */
  #tab-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    user-select: none;
    flex: 1 1 0;
    min-width: 60px;
    max-width: 300px;
    overflow: hidden;
  }
  .tab:active { background: var(--border-soft); }
  .tab.active { color: var(--text); border-bottom-color: var(--primary); }
  .tab.running { color: var(--orange); }
  .tab.running.active { border-bottom-color: var(--orange); }

  .tab-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tab-close {
    font-size: 14px;
    color: var(--effort-empty);
    border-radius: 3px;
    padding: 0 2px;
    flex-shrink: 0;
    line-height: 1;
  }
  .tab-close:hover { color: var(--red); }

  #add-tab-btn {
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-darker);
    font-size: 18px;
    padding: 8px 10px;
    cursor: pointer;
    order: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #add-tab-btn:active { color: var(--text-muted); background: var(--border-soft); }

  @media (max-width: 480px) {
    .tab { max-width: none; padding: 8px 8px; }
  }

  /* ── 出力エリア ── */
  #output-container {
    position: fixed;
    left: 0; right: 0;
    overflow: hidden;
  }

  .output-pane {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 12px 14px;
    font-family: 'Menlo', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.65;
    -webkit-overflow-scrolling: touch;
    display: none;
  }
  .output-pane.active { display: block; }

  .scheduled-posts-list {
    margin-bottom: 16px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .scheduled-post-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .scheduled-post-item:last-child { border-bottom: none; }
  .scheduled-post-time {
    color: var(--accent);
    font-weight: 500;
  }
  .scheduled-post-prompt {
    color: var(--text-muted);
    white-space: pre-wrap;
    max-height: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scheduled-post-actions {
    display: flex;
    gap: 8px;
  }
  .scheduled-post-actions button {
    background: var(--surface);
    border: 1px solid var(--border-input);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: inherit;
    color: var(--text-muted);
    cursor: pointer;
  }
  .scheduled-post-actions button:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
    color: var(--accent);
  }

  .line { margin-bottom: 2px; word-break: break-word; white-space: pre-wrap; }
  .line-user    { color: var(--green-user); }
  .line-text    { color: var(--text); white-space: normal; }
  .line-tool    { color: var(--accent); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  .line-tool .tool-name { font-style: italic; flex-shrink: 0; }
  .line-tool .tool-desc { color: var(--text-dim); font-style: normal; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .line-tool .tool-toggle { color: var(--text-darker); flex-shrink: 0; }
  .tool-result { color: var(--text-dim); margin-left: 20px; margin-top: 2px; white-space: pre-wrap; overflow-x: auto; max-height: 0; overflow-y: hidden; transition: max-height 0.2s; font-size: var(--code-font-size, 12px); }
  .tool-result.expanded { max-height: 800px; overflow-y: auto; }
  .tool-result-label { color: var(--text-darker); font-size: 10px; margin-bottom: 2px; margin-top: 6px; }
  .tool-result-label:first-child { margin-top: 0; }
  .diff-removed { display: block; background: rgba(220,50,50,0.15); color: var(--red); white-space: pre-wrap; padding: 0 4px; }
  .diff-added { display: block; background: rgba(80,180,80,0.15); color: var(--green-user); white-space: pre-wrap; padding: 0 4px; }
  .ask-questions { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; white-space: normal; }
  .ask-question { border-left: 2px solid var(--accent); padding-left: 8px; }
  .ask-header { font-size: 10px; color: var(--text-darker); text-transform: uppercase; letter-spacing: 0.5px; }
  .ask-text { color: var(--text); margin: 2px 0 4px; }
  .ask-option { color: var(--text-dim); padding: 1px 0; }
  .ask-option strong { color: var(--text); }
  .line-system  { color: var(--text-dim); }

function t(key) { return STRINGS[appSettings?.lang || 'ja'][key] }

// ── 設定管理 ──
const ALL_MODELS = [
  { value: '', label: 'Default (Sonnet 4.6)' },
  { value: 'claude-opus-4-6',         label: 'Opus 4.6' },
  { value: 'claude-sonnet-4-6',       label: 'Sonnet 4.6' },
  { value: 'claude-haiku-4-5-20251001', label: 'Haiku 4.5' },
]
const EFFORT_OPTIONS_BASE = [
  { value: '',       dots: [0,0,0,0], label: 'Auto' },
  { value: 'low',    dots: [1,0,0,0], label: 'Low' },
  { value: 'medium', dots: [1,1,0,0], label: 'Medium' },
  { value: 'high',   dots: [1,1,1,0], label: 'High' },
]
const EFFORT_OPTIONS_OPUS = [
  { value: '',       dots: [0,0,0,0], label: 'Auto' },
  { value: 'low',    dots: [1,0,0,0], label: 'Low' },
  { value: 'medium', dots: [1,1,0,0], label: 'Medium' },
  { value: 'high',   dots: [1,1,1,0], label: 'High' },
  { value: 'max',    dots: [1,1,1,1], label: 'Max' },
]
function getEffortOptions() {
  return (modelSel.value || '').includes('opus') ? EFFORT_OPTIONS_OPUS : EFFORT_OPTIONS_BASE
}

function loadSettings() {
  const defaults = {
    promptFontSize: 16,
    outputFontSize: 13,
    codeFontSize: 12,
    effort: '',
    thinking: 'none',
    defaultModel: '',
    enabledModels: ALL_MODELS.map(m => m.value),
    theme: window.DEFAULT_THEME || 'pocket-claude',
    resumePrompt: '続けてください',
    lang: 'ja',
  }
  try {
    const saved = JSON.parse(localStorage.getItem('pc-settings') || '{}')
    if (saved.thinking === true) saved.thinking = 'on'
    else if (saved.thinking === false) saved.thinking = 'off'
    return { ...defaults, ...saved }
  } catch { return defaults }
}

function saveSettings(s) {
  localStorage.setItem('pc-settings', JSON.stringify(s))
}

let appSettings = loadSettings()

function applyFontSizes() {
  promptEl.style.fontSize = appSettings.promptFontSize + 'px'
  document.querySelectorAll('.output-pane').forEach(p => {
    p.style.fontSize = appSettings.outputFontSize + 'px'
  })
  document.documentElement.style.setProperty('--code-font-size', appSettings.codeFontSize + 'px')
}

function applyFontSizesToPane(pane) {
  pane.style.fontSize = appSettings.outputFontSize + 'px'
}

function rebuildModelSelect() {
  const prev = modelSel.value
  modelSel.innerHTML = ''
  ALL_MODELS.forEach(m => {
    if (!appSettings.enabledModels.includes(m.value)) return
    const opt = document.createElement('option')
    opt.value = m.value
    opt.textContent = m.label
    modelSel.appendChild(opt)
  })
  // デフォルトモデルを適用
  const def = appSettings.defaultModel
  if (prev && [...modelSel.options].some(o => o.value === prev)) {
    modelSel.value = prev
  } else if ([...modelSel.options].some(o => o.value === def)) {
    modelSel.value = def
  } else if (modelSel.options.length > 0) {
    modelSel.value = modelSel.options[0].value
  }
}

function updateEffortIndicator() {
  const opts = getEffortOptions()
  const isOpus = opts === EFFORT_OPTIONS_OPUS
  // 4つ目のdotはOpusのみ表示
  const dot3 = effortIndicator.querySelector('.effort-dot[data-idx="3"]')
  if (dot3) dot3.style.display = isOpus ? '' : 'none'
  // maxが選択中だが非Opusに切り替わった場合はリセット
  const tabEffort = (currentSessionId && tabState[currentSessionId]) ? tabState[currentSessionId].effort : appSettings.effort
  if (!isOpus && tabEffort === 'max') {
    if (currentSessionId && tabState[currentSessionId]) {
      tabState[currentSessionId].effort = ''
      updateSession(currentSessionId, { effort: '' })
    } else {
      appSettings.effort = ''
      saveSettings(appSettings)
    }
  }
  const effectiveEffort = (!isOpus && tabEffort === 'max') ? '' : tabEffort
  const opt = opts.find(o => o.value === effectiveEffort) || opts[0]
  effortIndicator.querySelectorAll('.effort-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', opt.dots[i] === 1)
  })
  effortIndicator.title = `Effort: ${opt.label}`
}

function applyTheme() {
  const themeName = appSettings.theme || window.DEFAULT_THEME || 'pocket-claude'
  const theme = window.THEMES && window.THEMES[themeName]
  if (!theme) return
  const root = document.documentElement
  Object.entries(theme.vars).forEach(([key, val]) => {
    root.style.setProperty(key, val)
  })
}

// ── 設定モーダル操作 ──
function openSettings() {
  settingsModal.classList.add('open')
  settingsBtn.classList.add('active')
  renderSettingsModal()
  loadProjects()
}

function closeSettings() {
  settingsModal.classList.remove('open')
  settingsBtn.classList.remove('active')
}

function openScheduleModal() {
  scheduleModal.classList.add('open')
  scheduleBtn.classList.add('active')
  const now = new Date()
  const localStr = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16)
  scheduleDatetime.value = localStr
  schedulePrompt.value = ''
  schedulePrompt.focus()
}

function closeScheduleModal() {
  scheduleModal.classList.remove('open')
  scheduleBtn.classList.remove('active')
  clearScheduleError()
}

function showScheduleError(msg) {
  const el = document.getElementById('schedule-error')
  el.textContent = msg
  el.style.display = 'block'
}

function clearScheduleError() {
  const el = document.getElementById('schedule-error')
  if (el) { el.textContent = ''; el.style.display = 'none' }
}

async function saveScheduledPost() {
  clearScheduleError()
  const scheduledAt = scheduleDatetime.value
  const prompt = schedulePrompt.value.trim()

  if (!scheduledAt || !prompt) {
    showScheduleError('時刻とプロンプトを入力してください。')
    return
  }

  const scheduledDate = new Date(scheduledAt)
  if (scheduledDate <= new Date()) {
    showScheduleError('過去の時刻は指定できません。')
    return
  }

  const sessionId = currentSessionId
  if (!sessionId) {
    showScheduleError('アクティブなタブがありません。')
    return
  }

  const state = tabState[sessionId]
  const payload = {
    scheduledAt: scheduledDate.toISOString(),
    prompt,
    sessionId,
    project: state.project || null,
    model: state.model || null,
    effort: state.effort || null,
    thinking: state.thinking || null
  }

  try {
    const res = await fetch('/api/scheduled-posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    if (!res.ok) throw new Error('Failed to create scheduled post')
    const data = await res.json()
    closeScheduleModal()
    loadScheduledPosts()
  } catch (err) {
    console.error(err)
    showScheduleError('予約の作成に失敗しました。')
  }
}

function renderSettingsModal() {
  // Section titles & labels
  document.getElementById('stitle-lang').textContent     = t('langLabel')
  document.getElementById('stitle-font').textContent     = t('fontSizeLabel')
  document.getElementById('stitle-model').textContent    = t('modelLabel')
  document.getElementById('stitle-effort').textContent   = t('effortLabel')
  document.getElementById('stitle-thinking').textContent = t('thinkingLabel')
  document.getElementById('stitle-resume').textContent   = t('resumeLabel')
  document.getElementById('stitle-theme').textContent    = t('themeLabel')
  document.getElementById('stitle-project').textContent  = t('projectLabel')
  document.getElementById('flabel-prompt').textContent   = t('fontPrompt')
  document.getElementById('flabel-output').textContent   = t('fontOutput')
  document.getElementById('flabel-code').textContent     = t('fontCode')
  document.getElementById('project-name-input').placeholder = t('projectNamePh')
  document.getElementById('project-path-input').placeholder = t('projectPathPh')
  document.getElementById('project-add-btn').textContent = t('projectAddBtn')
  const thinkBtns = document.getElementById('thinking-selector').querySelectorAll('.seg-btn')
  thinkBtns[0].textContent = t('thinkingNone')
  thinkBtns[1].textContent = t('thinkingOn')
  thinkBtns[2].textContent = t('thinkingOff')

  // Language selector
  document.getElementById('lang-selector').querySelectorAll('.seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === (appSettings.lang || 'ja'))
    btn.onclick = () => {
      appSettings.lang = btn.dataset.val
      saveSettings(appSettings)
      renderSettingsModal()
      loadProjects()
    }
  })

  // Font size
  document.getElementById('prompt-font-val').textContent = appSettings.promptFontSize + 'px'
  document.getElementById('output-font-val').textContent = appSettings.outputFontSize + 'px'
  document.getElementById('code-font-val').textContent = appSettings.codeFontSize + 'px'

  // Model list
  const modelList = document.getElementById('settings-model-list')
  modelList.innerHTML = ''
  ALL_MODELS.forEach(m => {
    const row = document.createElement('div')
    row.className = 'model-row'

    const chk = document.createElement('input')
    chk.type = 'checkbox'
    chk.checked = appSettings.enabledModels.includes(m.value)
    chk.addEventListener('change', () => {
      if (chk.checked) {
        if (!appSettings.enabledModels.includes(m.value))
          appSettings.enabledModels.push(m.value)
      } else {
        // 最低1つは残す
        if (appSettings.enabledModels.length <= 1) { chk.checked = true; return }
        appSettings.enabledModels = appSettings.enabledModels.filter(v => v !== m.value)
        // デフォルトが非表示になったらリセット
        if (appSettings.defaultModel === m.value)
          appSettings.defaultModel = appSettings.enabledModels[0]
        renderSettingsModal()
      }
      saveSettings(appSettings)
      rebuildModelSelect()
    })

    const name = document.createElement('span')
    name.className = 'model-row-name'
    name.textContent = m.label

    const radio = document.createElement('input')
    radio.type = 'radio'
    radio.name = 'default-model'
    radio.value = m.value
    radio.checked = appSettings.defaultModel === m.value
    radio.disabled = !appSettings.enabledModels.includes(m.value)
    radio.addEventListener('change', () => {
      if (radio.checked) {
        appSettings.defaultModel = m.value
        saveSettings(appSettings)
        rebuildModelSelect()
        // ラベル更新
        modelList.querySelectorAll('.model-row-default-label').forEach(l => l.textContent = '')
        row.querySelector('.model-row-default-label').textContent = 'default'
      }
    })

    const defLabel = document.createElement('span')
    defLabel.className = 'model-row-default-label'
    defLabel.textContent = appSettings.defaultModel === m.value ? 'default' : ''

    row.appendChild(chk)
    row.appendChild(name)
    row.appendChild(radio)
    row.appendChild(defLabel)
    modelList.appendChild(row)
  })

  // Effort list
  const effortList = document.getElementById('settings-effort-list')
  effortList.innerHTML = ''
  getEffortOptions().forEach(opt => {
    const row = document.createElement('div')
    const curEffort = (currentSessionId && tabState[currentSessionId]) ? tabState[currentSessionId].effort : appSettings.effort
    row.className = 'effort-option' + (curEffort === opt.value ? ' selected' : '')
    row.addEventListener('click', () => {
      if (currentSessionId && tabState[currentSessionId]) {
        tabState[currentSessionId].effort = opt.value
        updateSession(currentSessionId, { effort: opt.value })
        appSettings.effort = opt.value
        saveSettings(appSettings)
      } else {
        appSettings.effort = opt.value
        saveSettings(appSettings)
      }
      updateEffortIndicator()
      effortList.querySelectorAll('.effort-option').forEach(r => r.classList.remove('selected'))
      row.classList.add('selected')
    })

    const dots = document.createElement('div')
    dots.className = 'effort-dots'
    opt.dots.forEach(filled => {
      const d = document.createElement('span')
      d.className = 'd' + (filled ? ' on' : '')
      dots.appendChild(d)
    })

    const label = document.createElement('span')
    label.className = 'effort-option-label'
    label.textContent = opt.label

    row.appendChild(dots)
    row.appendChild(label)
    effortList.appendChild(row)
  })

  // Thinking selector
  const normThinking = v => (v === true ? 'on' : v === false ? 'off' : (v || 'none'))
  const curThinking = normThinking((currentSessionId && tabState[currentSessionId])
    ? tabState[currentSessionId].thinking
    : appSettings.thinking)
  document.getElementById('thinking-selector').querySelectorAll('.seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === curThinking)
    btn.onclick = () => {
      const val = btn.dataset.val
      btn.closest('.seg-control').querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn))
      if (currentSessionId && tabState[currentSessionId]) {
        tabState[currentSessionId].thinking = val
        updateSession(currentSessionId, { thinking: val })
        appSettings.thinking = val
        saveSettings(appSettings)
      } else {
        appSettings.thinking = val
        saveSettings(appSettings)
      }
    }
  })

  // Resume prompt
  const resumeInput = document.getElementById('resume-prompt-input')
  resumeInput.value = appSettings.resumePrompt || '続けてください'
  resumeInput.oninput = (e) => { appSettings.resumePrompt = e.target.value; saveSettings(appSettings) }

  // Theme list
  const themeList = document.getElementById('settings-theme-list')
  themeList.innerHTML = ''
  if (window.THEMES) {
    Object.entries(window.THEMES).forEach(([key, theme]) => {
      const row = document.createElement('div')
      row.className = 'effort-option' + (appSettings.theme === key ? ' selected' : '')
      row.addEventListener('click', () => {
        appSettings.theme = key
        saveSettings(appSettings)
        applyTheme()
        themeList.querySelectorAll('.effort-option').forEach(r => r.classList.remove('selected'))
        row.classList.add('selected')
      })

      const label = document.createElement('span')
      label.className = 'effort-option-label'
      label.textContent = theme.name
      label.style.marginLeft = '0'

      row.appendChild(label)
      themeList.appendChild(row)
    })
  }
}

const tabState = {}   // sessionId -> { isRunning, currentTextEl, _rawText, _ctxTokens, pane, autoScroll }
const CTX_MAX = 200000
let currentSessionId = null
let currentES = null
let _projectsCache = {}
let reconnectTimer = null
let reconnectAttempts = 0
const MAX_RECONNECT_DELAY = 15000
let connectionCheckTimer = null
let lastHeartbeat = Date.now()

// ── localStorage管理 ──
function loadSessions() {
  const data = localStorage.getItem('sessions')
  return data ? JSON.parse(data) : []
}

function saveSessions(sessions) {
  localStorage.setItem('sessions', JSON.stringify(sessions))
}

function getCurrentSession() {
  return loadSessions().find(s => s.sessionId === currentSessionId)
}

function updateSession(sessionId, updates) {
  const sessions = loadSessions()
  const idx = sessions.findIndex(s => s.sessionId === sessionId)
  if (idx >= 0) {
    sessions[idx] = { ...sessions[idx], ...updates, lastUsed: Date.now() }
    saveSessions(sessions)
  }
}

// ── タブ状態初期化 ──
function ensureTabState(session) {
  if (tabState[session.sessionId]) return
  const pane = document.createElement('div')
  pane.className = 'output-pane'
  pane.dataset.sessionId = session.sessionId
  applyFontSizesToPane(pane)
  outputCont.appendChild(pane)
  tabState[session.sessionId] = {
    isRunning: false,
    currentTextEl: null,
    _rawText: '',
    _ctxTokens: 0,
    pane,
    autoScroll: true,  // デフォルトで自動スクロール有効
    _initialLoaded: false,  // 一括描画済みフラグ
    model: session.model || appSettings.defaultModel || '',
    effort: session.effort !== undefined ? session.effort : (appSettings.effort || ''),
    thinking: session.thinking !== undefined ? session.thinking : appSettings.thinking,
    draftPrompt: session.draftPrompt || '',
  }

  // ユーザーが手動でスクロールしたら自動スクロールを無効化
  pane.addEventListener('scroll', () => {
    const ts = tabState[session.sessionId]
    if (!ts) return
    // 最下部から100px以内なら自動スクロール再開
    if (isAtBottom(pane, 100)) {
      ts.autoScroll = true
    } else {
      ts.autoScroll = false
    }
  })
}

// ── タブDOM作成 ──
function createTabEl(session) {
  const el = document.createElement('div')
  el.className = 'tab'
  el.dataset.sessionId = session.sessionId

  const name = document.createElement('span')
  name.className = 'tab-name'
  name.textContent = session.name

  // ダブルタップで名前編集
  let tapTimer = null
  name.addEventListener('click', () => {
    if (tapTimer) {
      clearTimeout(tapTimer); tapTimer = null
      const newName = prompt('Rename conversation', name.textContent)
      if (newName?.trim()) {
        name.textContent = newName.trim()
        updateSession(session.sessionId, { name: newName.trim() })
        session.name = newName.trim()
      }
    } else {
      tapTimer = setTimeout(() => { tapTimer = null }, 350)
    }
  })

  el.appendChild(name)

  const closeBtn = document.createElement('span')
  closeBtn.className = 'tab-close'
  closeBtn.textContent = '×'
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation()
    deleteTab(session.sessionId)
  })
  el.appendChild(closeBtn)

  el.addEventListener('click', () => switchTab(session.sessionId))
  tabBar.insertBefore(el, addTabBtn)
  return el
}

// ── タブ削除 ──
async function deleteTab(sessionId) {
  clearRateLimitPanel(sessionId)
  fetch(`/api/schedule-resume/${encodeURIComponent(sessionId)}`, { method: 'DELETE' }).catch(() => {})
  tabBar.querySelector(`[data-session-id="${sessionId}"]`)?.remove()
  tabState[sessionId]?.pane.remove()
  delete tabState[sessionId]

  const sessions = loadSessions().filter(s => s.sessionId !== sessionId)
  saveSessions(sessions)

  if (currentSessionId === sessionId) {
    if (currentES) { currentES.close(); currentES = null }
    const remaining = [...tabBar.querySelectorAll('.tab')]
    if (remaining.length > 0) {
      switchTab(remaining[0].dataset.sessionId)
    } else {
      // 最後のタブを削除したので新規タブを作成
      const currentProj = Object.keys(_projectsCache)[0]
      const newSession = {
        sessionId: crypto.randomUUID(),
        name: 'Claude Code',
        project: currentProj,
        lastUsed: Date.now()
      }
      saveSessions([newSession])
      ensureTabState(newSession)
      createTabEl(newSession)
      switchTab(newSession.sessionId)
    }
  }
}

// ── タブ固有設定の適用 ──
function applyTabSettings(sessionId) {
  const ts = tabState[sessionId]
  if (!ts) return
  // モデル復元
  const targetModel = ts.model || appSettings.defaultModel
  if (targetModel && [...modelSel.options].some(o => o.value === targetModel)) {
    modelSel.value = targetModel
  } else if (modelSel.options.length > 0) {
    modelSel.value = modelSel.options[0].value
  }
  // プロンプト草稿復元
  promptEl.value = ts.draftPrompt || ''
  promptEl.style.height = 'auto'
  if (promptEl.value) promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px'
  // Effortインジケーター更新（ts.effortを使う）
  updateEffortIndicator()
}

// ── タブ切り替え ──
function switchTab(sessionId) {
  if (currentES) { currentES.close(); currentES = null }
  // 現在タブのプロンプト草稿・モデル・effortを保存
  if (currentSessionId && tabState[currentSessionId]) {
    tabState[currentSessionId].draftPrompt = promptEl.value
    updateSession(currentSessionId, {
      draftPrompt: promptEl.value,
      model: tabState[currentSessionId].model,
      effort: tabState[currentSessionId].effort,
      thinking: tabState[currentSessionId].thinking,
    })
  }
  tabBar.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.sessionId === sessionId))
  document.querySelectorAll('.output-pane').forEach(p =>
    p.classList.toggle('active', p.dataset.sessionId === sessionId))
  currentSessionId = sessionId
  localStorage.setItem('currentSessionId', sessionId)
  updateSession(sessionId, { lastUsed: Date.now() })
  const switchTs = tabState[sessionId]
  applyTabSettings(sessionId)
  updateUI()
  connectSSE(sessionId)  // SSE接続でログ復元後に自動スクロール
}

    // ノート表示
    const noteEl = document.getElementById('projects-note')
    if (noteEl) {
      if (canSwitch) {

        noteEl.classList.remove('locked')
      } else {
        noteEl.textContent = t('projectNoteLocked')
        noteEl.classList.add('locked')
      }

    projectsBody.innerHTML = ''
    projectError.style.display = 'none'

    for (const [name, projPath] of Object.entries(_projectsCache)) {
      const isCurrent = name === currentProject
      const isDefault = name === defaultProject

      const info = document.createElement('div')
      info.className = 'project-info'
      const nameEl = document.createElement('div')
      nameEl.className = 'project-name'
      nameEl.textContent = name
      const pathEl = document.createElement('div')
      pathEl.className = 'project-path'
      pathEl.textContent = projPath
      info.appendChild(nameEl)
      info.appendChild(pathEl)

      const star = document.createElement('span')
      star.className = 'project-star' + (isDefault ? ' active' : '')
      star.textContent = isDefault ? '★' : '☆'
      star.title = t('projectStarTitle')
      star.addEventListener('click', (e) => {
        e.stopPropagation()
        localStorage.setItem('pc-default-project', name)
        projectsBody.querySelectorAll('.project-star').forEach(s => {
          s.textContent = '☆'; s.classList.remove('active')
        })
        star.textContent = '★'; star.classList.add('active')
      })

      const removeBtn = document.createElement('button')
      removeBtn.className = 'project-remove'
      removeBtn.textContent = t('projectRemoveBtn')
      removeBtn.addEventListener('click', async (e) => {
        e.stopPropagation()
        if (!confirm(t('projectRemoveConfirm')(name))) return
        try {
          await fetch('/api/projects/remove', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
          })
          loadProjects()
        } catch (err) {
          projectError.textContent = `Error: ${err.message}`
          projectError.style.display = 'block'
        }
      })

      item.appendChild(indicator)
      item.appendChild(info)
      item.appendChild(star)
      item.appendChild(removeBtn)

      if (canSwitch && !isCurrent) {
        item.addEventListener('click', () => {
          updateSession(currentSessionId, { project: name })
          updatePlaceholder()
          loadProjects()
        })
      }

      projectsBody.appendChild(item)
    }
  } catch (err) {
    console.error('Failed to load projects:', err)
  }
}
