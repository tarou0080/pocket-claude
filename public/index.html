<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>pocket-claude</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="themes.js"></script>
<style>
  :root {
    /* Theme colors (will be overridden by themes.js) */
    --bg: #1a1a1a;
    --surface: #252525;
    --surface2: #2a2a2a;
    --surface3: #333;
    --border: #3a3a3a;
    --border-soft: #2a2a2a;
    --border-input: #4a4a4a;
    --text: #e0e0e0;
    --text-muted: #ccc;
    --text-dim: #888;
    --text-darker: #666;
    --accent: #64B5F6;
    --accent-hover: rgba(100, 181, 246, 0.12);
    --accent-active: rgba(100, 181, 246, 0.18);
    --accent-bg: #1a2535;
    --primary: #1565C0;
    --primary-dark: #0D47A1;
    --purple: #a78bfa;
    --purple-hover: rgba(167, 139, 250, 0.12);
    --purple-active: rgba(167, 139, 250, 0.18);
    --green: #4CAF50;
    --green-user: #81C784;
    --green-user-bg: #1e2a1e;
    --orange: #FF9800;
    --red: #EF5350;
    --red-bg: #3a2020;
    --effort-border: #666;
    --effort-empty: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
  }

  /* ── 上部固定エリア ── */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
  }

  /* ── ヘッダー ── */
  #header {
    background: var(--surface);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--effort-empty);
    flex-shrink: 0;
    transition: background 0.3s, width 0.3s, height 0.3s, border-radius 0.3s, padding 0.3s;
  }
  #status-dot.connected { background: var(--green); }
  #status-dot.running   { background: var(--orange); animation: pulse 1.2s infinite; }
  #status-dot.disconnected {
    width: auto; height: auto;
    border-radius: 6px;
    background: none;
    border: 1px solid var(--border-input);
    padding: 4px 8px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    min-width: 32px;
    text-align: center;
  }
  #status-dot.disconnected:active { background: var(--border); color: var(--text-muted); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  #model-select {
    background: var(--surface3);
    color: var(--text-muted);
    border: 1px solid var(--border-input);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 14px;
    flex-shrink: 0;
    min-width: 32px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  #model-select:hover {
    background: var(--border);
    border-color: var(--accent);
  }

  /* ── Effortインジケーター ── */
  #effort-indicator {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border-input);
    min-height: 30px;
    transition: background 0.2s, border-color 0.2s;
  }
  #effort-indicator:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
  }
  #effort-indicator:active { background: var(--border); }
  .effort-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--effort-border);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .effort-dot.filled { background: var(--accent); border-color: var(--accent); }

  /* ── 設定ボタン ── */
  #settings-btn {
    background: transparent;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    min-width: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
  }
  #settings-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
    color: var(--accent);
  }
  #settings-btn:active { background: var(--accent-active); }
  #settings-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── 設定モーダル ── */
  #settings-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
  }
  #settings-modal.open { display: flex; }

  #settings-content {
    background: var(--surface);
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #settings-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #settings-header h3 { font-size: 15px; color: var(--text); }
  #settings-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
  }
  #settings-close:active { color: var(--text-muted); }

  #settings-body {
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .settings-section-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  /* フォントサイズ */
  .font-size-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .font-size-row:last-child { margin-bottom: 0; }
  .font-size-label { font-size: 13px; color: var(--text-muted); }
  .font-size-ctrl { display: flex; align-items: center; gap: 8px; }
  .font-size-btn {
    background: var(--surface3); border: 1px solid var(--border-input); color: var(--text-muted);
    border-radius: 6px; width: 28px; height: 28px;
    font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .font-size-btn:active { background: var(--border); }
  .font-size-val { font-size: 13px; color: var(--text); min-width: 36px; text-align: center; }

  /* モデル設定 */
  .model-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    margin-bottom: 6px;
  }
  .model-row:last-child { margin-bottom: 0; }
  .model-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .model-row-name { flex: 1; font-size: 13px; color: var(--text-muted); }
  .model-row input[type="radio"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
  .model-row-default-label { font-size: 11px; color: var(--accent); margin-left: 2px; min-width: 44px; text-align: right; }

  /* Effort設定 */
  .effort-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .effort-option:last-child { margin-bottom: 0; }
  .effort-option:active { background: var(--border-soft); }
  .effort-option.selected { background: var(--accent-bg); }
  .effort-dots { display: flex; gap: 3px; flex-shrink: 0; }
  .effort-dots .d {
    width: 9px; height: 9px;
    border-radius: 50%;
    border: 1.5px solid var(--effort-empty);
    background: transparent;
  }
  .effort-dots .d.on { background: var(--accent); border-color: var(--accent); }
  .effort-option-label { font-size: 13px; color: var(--text-muted); flex: 1; }
  .effort-option.selected .effort-option-label { color: var(--text); }

  #stop-btn, #history-btn, #projects-btn {
    background: none;
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 32px;
    text-align: center;
  }
  #stop-btn { color: var(--red); border-color: var(--red); opacity: 0.3; pointer-events: none; transition: background 0.2s, opacity 0.2s; }
  #stop-btn.running { opacity: 1; pointer-events: auto; }
  #stop-btn.running:hover { background: var(--red-bg); }
  #stop-btn:active { background: var(--red-bg); }

  #history-btn, #projects-btn {
    color: var(--text-dim);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #history-btn:hover, #projects-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent);
    color: var(--accent);
  }
  #history-btn:active, #projects-btn:active { background: var(--border); color: var(--text-muted); }
  #history-btn.active, #projects-btn.active { color: var(--accent); border-color: var(--accent); }

  /* ── 履歴パネル ── */
  #history-panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 30;
    background: var(--bg);
    flex-direction: column;
  }
  #history-panel.open { display: flex; }

  #history-header {
    background: var(--surface);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #history-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
  }
  #history-back:active { background: var(--border-soft); }
  #history-title {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #history-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* 一覧 */
  .history-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer;
    user-select: none;
  }
  .history-item:active { background: var(--surface); }
  .history-item-title {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .history-item-meta {
    font-size: 11px;
    color: var(--text-darker);
  }

  /* 詳細 */
  .history-msg {
    padding: 10px 14px;
    border-bottom: 1px solid var(--surface);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .history-msg-user { color: var(--green-user); background: var(--green-user-bg); }
  .history-msg-assistant { color: var(--text); }

  /* 再開ボタン */
  #resume-btn {
    margin: 20px 14px;
    padding: 14px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    width: calc(100% - 28px);
    text-align: center;
  }
  #resume-btn:active { background: var(--primary-dark); }

  /* ── プロジェクトモーダル ── */
  #projects-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0, 0, 0, 0.8);
    align-items: center;
    justify-content: center;
  }
  #projects-modal.open { display: flex; }

  #projects-content {
    background: var(--surface);
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  #projects-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #projects-header h3 {
    font-size: 16px;
    color: var(--text);
  }

  #projects-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }
  #projects-close:active { color: var(--text-muted); }

  #projects-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .project-item {
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .project-info {
    flex: 1;
    overflow: hidden;
  }

  .project-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .project-path {
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .project-remove {
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 10px;
  }
  .project-remove:active { background: var(--red-bg); }

  #project-add-form {
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  #project-add-form input {
    width: 100%;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border-input);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 10px;
  }

  #project-add-form input::placeholder {
    color: var(--text-darker);
  }

  #project-add-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  #project-add-btn:active { background: var(--primary-dark); }

  #project-error {
    color: var(--red);
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }

  #projects-note {
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 16px 0;
    flex-shrink: 0;
  }

  .project-item.current .project-name { color: var(--accent); }
  .project-item.locked { cursor: default; }
  .project-item:not(.locked):not(.current):hover { background: var(--border-soft); cursor: pointer; }

  .project-star {
    font-size: 16px;
    color: var(--effort-empty);
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .project-star.active { color: #fbbf24; }
  .project-star:hover { color: #fbbf24; opacity: 0.7; }

  /* ── タブバー ── */
  #tab-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    user-select: none;
    flex: 1 1 0;
    min-width: 60px;
    max-width: 300px;
    overflow: hidden;
  }
  .tab:active { background: var(--border-soft); }
  .tab.active { color: var(--text); border-bottom-color: var(--primary); }
  .tab.running { color: var(--orange); }
  .tab.running.active { border-bottom-color: var(--orange); }

  .tab-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tab-close {
    font-size: 14px;
    color: var(--effort-empty);
    border-radius: 3px;
    padding: 0 2px;
    flex-shrink: 0;
    line-height: 1;
  }
  .tab-close:hover { color: var(--red); }

  #add-tab-btn {
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-darker);
    font-size: 18px;
    padding: 8px 10px;
    cursor: pointer;
    order: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #add-tab-btn:active { color: var(--text-muted); background: var(--border-soft); }

  @media (max-width: 480px) {
    .tab { max-width: none; padding: 8px 8px; }
  }

  /* ── 出力エリア ── */
  #output-container {
    position: fixed;
    left: 0; right: 0;
    overflow: hidden;
  }

  .output-pane {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 12px 14px;
    font-family: 'Menlo', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.65;
    -webkit-overflow-scrolling: touch;
    display: none;
  }
  .output-pane.active { display: block; }

  .line { margin-bottom: 2px; word-break: break-word; white-space: pre-wrap; }
  .line-user    { color: var(--green-user); }
  .line-text    { color: var(--text); white-space: normal; }
  .line-tool    { color: var(--accent); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  .line-tool .tool-name { font-style: italic; flex-shrink: 0; }
  .line-tool .tool-desc { color: var(--text-dim); font-size: 11px; font-style: normal; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .line-tool .tool-toggle { font-size: 10px; color: var(--text-darker); flex-shrink: 0; }
  .tool-result { color: var(--text-dim); font-size: 11px; margin-left: 20px; margin-top: 2px; white-space: pre-wrap; overflow-x: auto; max-height: 0; overflow-y: hidden; transition: max-height 0.2s; }
  .tool-result.expanded { max-height: 500px; overflow-y: auto; }
  .line-system  { color: var(--text-dim); font-size: 11px; }
  .line-done    { color: var(--green); border-top: 1px solid var(--surface3); margin-top: 6px; padding-top: 6px; }
  .line-done.warn { color: var(--orange); }
  #ctx-badge { font-size: 11px; color: var(--effort-empty); flex-shrink: 0; }
  #ctx-badge.warn { color: var(--orange); font-weight: bold; }
  .line-error   { color: var(--red); }
  .line-thinking { color: var(--purple); font-size: 11px; font-style: italic; }

  /* マークダウン */
  .line-text p  { margin: 0 0 6px; }
  .line-text p:last-child { margin-bottom: 0; }
  .line-text h1,.line-text h2,.line-text h3 { margin: 8px 0 4px; font-size: 1em; color: var(--accent); }
  .line-text ul,.line-text ol { padding-left: 18px; margin: 4px 0; }
  .line-text li { margin: 2px 0; }
  .line-text code { background: var(--border-soft); border: 1px solid var(--border); border-radius: 3px; padding: 1px 4px; font-family: 'Menlo','Courier New',monospace; font-size: 12px; }
  .line-text pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin: 6px 0; overflow-x: auto; }
  .line-text pre code { background: none; border: none; padding: 0; font-size: 12px; }
  .line-text strong { color: #fff; }
  .line-text a { color: var(--accent); }
  .line-text blockquote { border-left: 3px solid var(--effort-empty); padding-left: 10px; color: var(--text-muted); margin: 4px 0; }

  /* ── 入力エリア ── */
  #input-area {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    z-index: 20;
  }

  #input-row { display: flex; gap: 8px; align-items: flex-end; }

  #prompt {
    flex: 1;
    background: var(--surface3);
    color: var(--text);
    border: 1px solid var(--border-input);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 16px;
    line-height: 1.5;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    font-family: -apple-system, sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #prompt:focus { border-color: var(--primary); }

  #send-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0 16px;
    font-size: 17px;
    cursor: pointer;
    flex-shrink: 0;
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: flex-end;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send-btn:active { opacity: 0.8; transform: scale(0.96); }
</style>
</head>
<body>

<div id="top-bar">
  <div id="header">
    <div id="status-dot"></div>
    <span id="ctx-badge"></span>
    <select id="model-select"></select>
    <div id="effort-indicator" title="Effort level">

<script>
const historyBtn      = document.getElementById('history-btn')
const historyPanel    = document.getElementById('history-panel')
const historyBack     = document.getElementById('history-back')
const historyTitle    = document.getElementById('history-title')
const historyBody     = document.getElementById('history-body')
const projectsBtn     = document.getElementById('projects-btn')
const projectsModal   = document.getElementById('projects-modal')
const projectsClose   = document.getElementById('projects-close')
const projectsBody    = document.getElementById('projects-body')
const projectNameInput = document.getElementById('project-name-input')
const projectPathInput = document.getElementById('project-path-input')
const projectAddBtn   = document.getElementById('project-add-btn')
const projectError    = document.getElementById('project-error')
const promptEl        = document.getElementById('prompt')
const sendBtn         = document.getElementById('send-btn')
const statusDot       = document.getElementById('status-dot')
const modelSel        = document.getElementById('model-select')
const stopBtn         = document.getElementById('stop-btn')
const tabBar          = document.getElementById('tab-bar')
const addTabBtn       = document.getElementById('add-tab-btn')
const outputCont      = document.getElementById('output-container')
const effortIndicator = document.getElementById('effort-indicator')
const settingsBtn     = document.getElementById('settings-btn')
const settingsModal   = document.getElementById('settings-modal')
const settingsClose   = document.getElementById('settings-close')

// ── 設定管理 ──
const ALL_MODELS = [
  { value: '', label: '(claude default)' },
  { value: 'claude-opus-4-6',         label: 'Opus 4.6' },
  { value: 'claude-sonnet-4-6',       label: 'Sonnet 4.6' },
  { value: 'claude-haiku-4-5-20251001', label: 'Haiku 4.5' },
]
const EFFORT_OPTIONS = [
  { value: '',      dots: [0,0,0,0], label: 'default' },
  { value: 'low',   dots: [1,0,0,0], label: 'low' },
  { value: 'medium',dots: [1,1,0,0], label: 'medium' },
  { value: 'high',  dots: [1,1,1,0], label: 'high' },
  { value: 'max',   dots: [1,1,1,1], label: 'max' },
]

function loadSettings() {
  const defaults = {
    promptFontSize: 16,
    outputFontSize: 13,
    effort: '',
    defaultModel: '',
    enabledModels: ALL_MODELS.map(m => m.value),
    theme: window.DEFAULT_THEME || 'pocket-claude',
  }
  try {
    const saved = JSON.parse(localStorage.getItem('pc-settings') || '{}')
    return { ...defaults, ...saved }
  } catch { return defaults }
}

function saveSettings(s) {
  localStorage.setItem('pc-settings', JSON.stringify(s))
}

let appSettings = loadSettings()

function applyFontSizes() {
  promptEl.style.fontSize = appSettings.promptFontSize + 'px'
  document.querySelectorAll('.output-pane').forEach(p => {
    p.style.fontSize = appSettings.outputFontSize + 'px'
  })
}

function applyFontSizesToPane(pane) {
  pane.style.fontSize = appSettings.outputFontSize + 'px'
}

function rebuildModelSelect() {
  const prev = modelSel.value
  modelSel.innerHTML = ''
  ALL_MODELS.forEach(m => {
    if (!appSettings.enabledModels.includes(m.value)) return
    const opt = document.createElement('option')
    opt.value = m.value
    opt.textContent = m.label
    modelSel.appendChild(opt)
  })
  // デフォルトモデルを適用
  const def = appSettings.defaultModel
  if (prev && [...modelSel.options].some(o => o.value === prev)) {
    modelSel.value = prev
  } else if ([...modelSel.options].some(o => o.value === def)) {
    modelSel.value = def
  } else if (modelSel.options.length > 0) {
    modelSel.value = modelSel.options[0].value
  }
}

function updateEffortIndicator() {
  const opt = EFFORT_OPTIONS.find(o => o.value === appSettings.effort) || EFFORT_OPTIONS[0]
  effortIndicator.querySelectorAll('.effort-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', opt.dots[i] === 1)
  })
  effortIndicator.title = `Effort: ${opt.label}`
}

function applyTheme() {
  const themeName = appSettings.theme || window.DEFAULT_THEME || 'pocket-claude'
  const theme = window.THEMES && window.THEMES[themeName]
  if (!theme) return
  const root = document.documentElement
  Object.entries(theme.vars).forEach(([key, val]) => {
    root.style.setProperty(key, val)
  })
}

// ── 設定モーダル操作 ──
function openSettings() {
  settingsModal.classList.add('open')
  settingsBtn.classList.add('active')
  renderSettingsModal()
}

function closeSettings() {
  settingsModal.classList.remove('open')
  settingsBtn.classList.remove('active')
}

function renderSettingsModal() {
  // Font size
  document.getElementById('prompt-font-val').textContent = appSettings.promptFontSize + 'px'
  document.getElementById('output-font-val').textContent = appSettings.outputFontSize + 'px'

  // Model list
  const modelList = document.getElementById('settings-model-list')
  modelList.innerHTML = ''
  ALL_MODELS.forEach(m => {
    const row = document.createElement('div')
    row.className = 'model-row'

    const chk = document.createElement('input')
    chk.type = 'checkbox'
    chk.checked = appSettings.enabledModels.includes(m.value)
    chk.addEventListener('change', () => {
      if (chk.checked) {
        if (!appSettings.enabledModels.includes(m.value))
          appSettings.enabledModels.push(m.value)
      } else {
        // 最低1つは残す
        if (appSettings.enabledModels.length <= 1) { chk.checked = true; return }
        appSettings.enabledModels = appSettings.enabledModels.filter(v => v !== m.value)
        // デフォルトが非表示になったらリセット
        if (appSettings.defaultModel === m.value)
          appSettings.defaultModel = appSettings.enabledModels[0]
        renderSettingsModal()
      }
      saveSettings(appSettings)
      rebuildModelSelect()
    })

    const name = document.createElement('span')
    name.className = 'model-row-name'
    name.textContent = m.label

    const radio = document.createElement('input')
    radio.type = 'radio'
    radio.name = 'default-model'
    radio.value = m.value
    radio.checked = appSettings.defaultModel === m.value
    radio.disabled = !appSettings.enabledModels.includes(m.value)
    radio.addEventListener('change', () => {
      if (radio.checked) {
        appSettings.defaultModel = m.value
        saveSettings(appSettings)
        rebuildModelSelect()
        // ラベル更新
        modelList.querySelectorAll('.model-row-default-label').forEach(l => l.textContent = '')
        row.querySelector('.model-row-default-label').textContent = 'default'
      }
    })

    const defLabel = document.createElement('span')
    defLabel.className = 'model-row-default-label'
    defLabel.textContent = appSettings.defaultModel === m.value ? 'default' : ''

    row.appendChild(chk)
    row.appendChild(name)
    row.appendChild(radio)
    row.appendChild(defLabel)
    modelList.appendChild(row)
  })

  // Effort list
  const effortList = document.getElementById('settings-effort-list')
  effortList.innerHTML = ''
  EFFORT_OPTIONS.forEach(opt => {
    const row = document.createElement('div')
    row.className = 'effort-option' + (appSettings.effort === opt.value ? ' selected' : '')
    row.addEventListener('click', () => {
      appSettings.effort = opt.value
      saveSettings(appSettings)
      updateEffortIndicator()
      effortList.querySelectorAll('.effort-option').forEach(r => r.classList.remove('selected'))
      row.classList.add('selected')
    })

    const dots = document.createElement('div')
    dots.className = 'effort-dots'
    opt.dots.forEach(filled => {
      const d = document.createElement('span')
      d.className = 'd' + (filled ? ' on' : '')
      dots.appendChild(d)
    })

    const label = document.createElement('span')
    label.className = 'effort-option-label'
    label.textContent = opt.label

    row.appendChild(dots)
    row.appendChild(label)
    effortList.appendChild(row)
  })

  // Theme list
  const themeList = document.getElementById('settings-theme-list')
  themeList.innerHTML = ''
  if (window.THEMES) {
    Object.entries(window.THEMES).forEach(([key, theme]) => {
      const row = document.createElement('div')
      row.className = 'effort-option' + (appSettings.theme === key ? ' selected' : '')
      row.addEventListener('click', () => {
        appSettings.theme = key
        saveSettings(appSettings)
        applyTheme()
        themeList.querySelectorAll('.effort-option').forEach(r => r.classList.remove('selected'))
        row.classList.add('selected')
      })

      const label = document.createElement('span')
      label.className = 'effort-option-label'
      label.textContent = theme.name
      label.style.marginLeft = '0'

      row.appendChild(label)
      themeList.appendChild(row)
    })
  }
}

settingsBtn.addEventListener('click', () => {
  if (settingsModal.classList.contains('open')) closeSettings()
  else openSettings()
})
settingsClose.addEventListener('click', closeSettings)
settingsModal.addEventListener('click', e => {
  if (e.target === settingsModal) closeSettings()
})
effortIndicator.addEventListener('click', openSettings)

// フォントサイズボタン
document.getElementById('prompt-font-dec').addEventListener('click', () => {
  if (appSettings.promptFontSize <= 10) return
  appSettings.promptFontSize--
  saveSettings(appSettings)
  applyFontSizes()
  document.getElementById('prompt-font-val').textContent = appSettings.promptFontSize + 'px'
})
document.getElementById('prompt-font-inc').addEventListener('click', () => {
  if (appSettings.promptFontSize >= 24) return
  appSettings.promptFontSize++
  saveSettings(appSettings)
  applyFontSizes()
  document.getElementById('prompt-font-val').textContent = appSettings.promptFontSize + 'px'
})
document.getElementById('output-font-dec').addEventListener('click', () => {
  if (appSettings.outputFontSize <= 10) return
  appSettings.outputFontSize--
  saveSettings(appSettings)
  applyFontSizes()
  document.getElementById('output-font-val').textContent = appSettings.outputFontSize + 'px'
})
document.getElementById('output-font-inc').addEventListener('click', () => {
  if (appSettings.outputFontSize >= 24) return
  appSettings.outputFontSize++
  saveSettings(appSettings)
  applyFontSizes()
  document.getElementById('output-font-val').textContent = appSettings.outputFontSize + 'px'
})

const tabState = {}   // sessionId -> { isRunning, currentTextEl, _rawText, _ctxTokens, pane, autoScroll }
const CTX_MAX = 200000
const ctxBadge = document.getElementById('ctx-badge')
let currentSessionId = null
let currentES = null
let _projectsCache = {}
let reconnectTimer = null
let reconnectAttempts = 0
const MAX_RECONNECT_DELAY = 15000
let connectionCheckTimer = null
let lastHeartbeat = Date.now()

// ── localStorage管理 ──
function loadSessions() {
  const data = localStorage.getItem('sessions')
  return data ? JSON.parse(data) : []
}

function saveSessions(sessions) {
  localStorage.setItem('sessions', JSON.stringify(sessions))
}

function getCurrentSession() {
  return loadSessions().find(s => s.sessionId === currentSessionId)
}

function updateSession(sessionId, updates) {
  const sessions = loadSessions()
  const idx = sessions.findIndex(s => s.sessionId === sessionId)
  if (idx >= 0) {
    sessions[idx] = { ...sessions[idx], ...updates, lastUsed: Date.now() }
    saveSessions(sessions)
  }
}

// ── タブ状態初期化 ──
function ensureTabState(session) {
  if (tabState[session.sessionId]) return
  const pane = document.createElement('div')
  pane.className = 'output-pane'
  pane.dataset.sessionId = session.sessionId
  applyFontSizesToPane(pane)
  outputCont.appendChild(pane)
  tabState[session.sessionId] = {
    isRunning: false,
    currentTextEl: null,
    _rawText: '',
    _ctxTokens: 0,
    pane,
    autoScroll: true,  // デフォルトで自動スクロール有効
    _initialLoaded: false  // 一括描画済みフラグ
  }

  // ユーザーが手動でスクロールしたら自動スクロールを無効化
  pane.addEventListener('scroll', () => {
    const ts = tabState[session.sessionId]
    if (!ts) return
    // 最下部から100px以内なら自動スクロール再開
    if (isAtBottom(pane, 100)) {
      ts.autoScroll = true
    } else {
      ts.autoScroll = false
    }
  })
}

// ── タブDOM作成 ──
function createTabEl(session) {
  const el = document.createElement('div')
  el.className = 'tab'
  el.dataset.sessionId = session.sessionId

  const name = document.createElement('span')
  name.className = 'tab-name'
  name.textContent = session.name

  // ダブルタップで名前編集
  let tapTimer = null
  name.addEventListener('click', () => {
    if (tapTimer) {
      clearTimeout(tapTimer); tapTimer = null
      const newName = prompt('Rename conversation', name.textContent)
      if (newName?.trim()) {
        name.textContent = newName.trim()
        updateSession(session.sessionId, { name: newName.trim() })
        session.name = newName.trim()
      }
    } else {
      tapTimer = setTimeout(() => { tapTimer = null }, 350)
    }
  })

  el.appendChild(name)

  const closeBtn = document.createElement('span')
  closeBtn.className = 'tab-close'
  closeBtn.textContent = '×'
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation()
    deleteTab(session.sessionId)
  })
  el.appendChild(closeBtn)

  el.addEventListener('click', () => switchTab(session.sessionId))
  tabBar.insertBefore(el, addTabBtn)
  return el
}

// ── タブ削除 ──
async function deleteTab(sessionId) {
  tabBar.querySelector(`[data-session-id="${sessionId}"]`)?.remove()
  tabState[sessionId]?.pane.remove()
  delete tabState[sessionId]

  const sessions = loadSessions().filter(s => s.sessionId !== sessionId)
  saveSessions(sessions)

  if (currentSessionId === sessionId) {
    if (currentES) { currentES.close(); currentES = null }
    const remaining = [...tabBar.querySelectorAll('.tab')]
    if (remaining.length > 0) {
      switchTab(remaining[0].dataset.sessionId)
    } else {
      // 最後のタブを削除したので新規タブを作成
      const currentProj = Object.keys(_projectsCache)[0]
      const newSession = {
        sessionId: crypto.randomUUID(),
        name: 'Claude Code',
        project: currentProj,
        lastUsed: Date.now()
      }
      saveSessions([newSession])
      ensureTabState(newSession)
      createTabEl(newSession)
      switchTab(newSession.sessionId)
    }
  }
}

// ── タブ切り替え ──
function switchTab(sessionId) {
  if (currentES) { currentES.close(); currentES = null }
  tabBar.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.sessionId === sessionId))
  document.querySelectorAll('.output-pane').forEach(p =>
    p.classList.toggle('active', p.dataset.sessionId === sessionId))
  currentSessionId = sessionId
  localStorage.setItem('currentSessionId', sessionId)
  updateSession(sessionId, { lastUsed: Date.now() })
  const switchTs = tabState[sessionId]
  if (switchTs) { const p = Math.round(switchTs._ctxTokens / CTX_MAX * 100); updateCtxBadge(p) }
  updateUI()
  connectSSE(sessionId)  // SSE接続でログ復元後に自動スクロール
}

// ── プロジェクト管理 ──
async function loadProjects() {
  try {
    _projectsCache = await fetch('/api/projects/list').then(r => r.json())
    const currentSession = getCurrentSession()
    const currentProject = currentSession?.project || Object.keys(_projectsCache)[0]

    // 未送信セッションのみ切り替え可
    const ts = tabState[currentSessionId]
    const canSwitch = !!(ts && ts.pane.children.length === 0 && !ts.isRunning)

    // ノート表示
    const noteEl = document.getElementById('projects-note')
    if (noteEl) {
      noteEl.textContent = canSwitch
        ? 'Select a project for this session (before first message).'
        : 'Session already started. ★ changes the default for new sessions.'
    }

    const defaultProject = localStorage.getItem('pc-default-project') || currentProject

    projectsBody.innerHTML = ''
    projectError.style.display = 'none'

    for (const [name, projPath] of Object.entries(_projectsCache)) {
      const isCurrent = name === currentProject
      const isDefault = name === defaultProject

      const item = document.createElement('div')
      item.className = 'project-item' + (isCurrent ? ' current' : '') + (!canSwitch ? ' locked' : '')

      const indicator = document.createElement('span')
      indicator.style.cssText = 'width:12px;flex-shrink:0;font-size:8px;text-align:center;color:#64B5F6'
      indicator.textContent = isCurrent ? '●' : ''

      const info = document.createElement('div')
      info.className = 'project-info'
      const nameEl = document.createElement('div')
      nameEl.className = 'project-name'
      nameEl.textContent = name
      const pathEl = document.createElement('div')
      pathEl.className = 'project-path'
      pathEl.textContent = projPath
      info.appendChild(nameEl)
      info.appendChild(pathEl)

      const star = document.createElement('span')
      star.className = 'project-star' + (isDefault ? ' active' : '')
      star.textContent = isDefault ? '★' : '☆'
      star.title = 'Set as default for new sessions'
      star.addEventListener('click', (e) => {
        e.stopPropagation()
        localStorage.setItem('pc-default-project', name)
        projectsBody.querySelectorAll('.project-star').forEach(s => {
          s.textContent = '☆'; s.classList.remove('active')
        })
        star.textContent = '★'; star.classList.add('active')
      })

      const removeBtn = document.createElement('button')
      removeBtn.className = 'project-remove'
      removeBtn.textContent = 'Remove'
      removeBtn.addEventListener('click', async (e) => {
        e.stopPropagation()
        if (!confirm(`Remove project "${name}"?`)) return
        try {
          await fetch('/api/projects/remove', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
          })
          loadProjects()
        } catch (err) {
          projectError.textContent = `Error: ${err.message}`
          projectError.style.display = 'block'
        }
      })

      item.appendChild(indicator)
      item.appendChild(info)
      item.appendChild(star)
      item.appendChild(removeBtn)

      if (canSwitch && !isCurrent) {
        item.addEventListener('click', () => {
          updateSession(currentSessionId, { project: name })
          updatePlaceholder()
          projectsModal.classList.remove('open')
          projectsBtn.classList.remove('active')
        })
      }

      projectsBody.appendChild(item)
    }
  } catch (err) {
    console.error('Failed to load projects:', err)
  }
}

projectsBtn.addEventListener('click', () => {
  projectsModal.classList.add('open')
  projectsBtn.classList.add('active')
  loadProjects()
})

projectsClose.addEventListener('click', () => {
  projectsModal.classList.remove('open')
  projectsBtn.classList.remove('active')
  projectError.style.display = 'none'
})

projectsModal.addEventListener('click', (e) => {
  if (e.target === projectsModal) {
    projectsModal.classList.remove('open')
    projectsBtn.classList.remove('active')
    projectError.style.display = 'none'
  }
})

projectAddBtn.addEventListener('click', async () => {
  const name = projectNameInput.value.trim()
  const path = projectPathInput.value.trim()

  projectError.style.display = 'none'

  if (!name || !path) {
    projectError.textContent = 'Name and path are required'
    projectError.style.display = 'block'
    return
  }

  try {
    const res = await fetch('/api/projects/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, path })
    })

    if (!res.ok) {
      const data = await res.json()
      throw new Error(data.error || 'Failed to add project')
    }

    projectNameInput.value = ''
    projectPathInput.value = ''
    loadProjects()
  } catch (err) {
    projectError.textContent = err.message
    projectError.style.display = 'block'
  }
})

// ── 初期化 ──
async function init() {
  applyTheme()
  rebuildModelSelect()
  applyFontSizes()
  updateEffortIndicator()
  await refreshProjectsCache()
  let sessions = loadSessions()

  // 旧名称 'New conversation' → 'Claude Code' に移行
  const migrated = sessions.map(s => s.name === 'New conversation' ? { ...s, name: 'Claude Code' } : s)
  if (migrated.some((s, i) => s.name !== sessions[i].name)) saveSessions(migrated)
  sessions = migrated

  // 初回起動時、セッションがなければ作成
  if (sessions.length === 0) {
    const defaultProject = Object.keys(_projectsCache)[0]
    sessions = [{
      sessionId: crypto.randomUUID(),
      name: 'Claude Code',
      project: defaultProject,
      lastUsed: Date.now()
    }]
    saveSessions(sessions)
  }

  sessions.forEach(s => { ensureTabState(s); createTabEl(s) })

  // 前回のセッションを復元
  const lastSessionId = localStorage.getItem('currentSessionId')
  const startSession = sessions.find(s => s.sessionId === lastSessionId) || sessions[0]
  switchTab(startSession.sessionId)

  // ネットワーク監視を開始
  startNetworkMonitoring()
}

// ── UI更新 ──
function getTS() { return tabState[currentSessionId] || {} }

function updateUI() {
  const ts = getTS()
  const running = ts.isRunning || false
  // disconnected状態を維持（再接続中は上書きしない）
  if (!statusDot.classList.contains('disconnected')) {
    statusDot.className = running ? 'running' : 'connected'
    statusDot.textContent = ''
  }
  stopBtn.classList.toggle('running', running)
  tabBar.querySelectorAll('.tab').forEach(el => {
    const ts2 = tabState[el.dataset.sessionId]
    el.classList.toggle('running', ts2?.isRunning || false)
  })
  updatePlaceholder()
}

function updatePlaceholder() {
  const currentSession = getCurrentSession()
  if (!currentSession) return

  const projectPath = _projectsCache[currentSession.project] || ''
  promptEl.placeholder = projectPath
    ? `${projectPath}   (Ctrl+Enter to send)`
    : 'Enter prompt... (Ctrl+Enter to send)'
}

async function refreshProjectsCache() {
  try {
    _projectsCache = await fetch('/api/projects/list').then(r => r.json())
    updatePlaceholder()
  } catch (err) {
    console.error('Failed to fetch projects:', err)
  }
}

// ── SSE接続 ──
async function connectSSE(sessionId, isReconnect = false) {
  const ts = tabState[sessionId]
  if (!ts) return

  // 完了済みセッション（実行中でない）かつ初回接続の場合は一括描画
  if (!ts.isRunning && !isReconnect && !ts._initialLoaded) {
    await loadHistoryBulk(sessionId)
    ts._initialLoaded = true
    // 一括描画後はskipHistory=1でSSE接続（新イベント監視のみ）
    connectSSEStream(sessionId, true)
  } else {
    connectSSEStream(sessionId, false)
  }
}

// 完了済みセッションの一括描画
async function loadHistoryBulk(sessionId) {
  const ts = tabState[sessionId]
  if (!ts) return

  try {
    const res = await fetch(`/api/history/${encodeURIComponent(sessionId)}/events`)
    if (!res.ok) {
      // 履歴がない場合は通常のSSE接続にフォールバック
      return
    }
    const events = await res.json()

    // 全イベントを一括処理
    events.forEach(ev => handleEvent(sessionId, ev))

    // 一括描画完了後に最下部へスクロール
    ts.autoScroll = true
    requestAnimationFrame(() => {
      ts.pane.scrollTop = ts.pane.scrollHeight
    })
  } catch (err) {
    console.error('Failed to load history bulk:', err)
  }
}

// SSE接続（実際のストリーム処理）
function connectSSEStream(sessionId, skipHistory = false) {
  // 既存の接続をクローズ
  if (currentES) {
    currentES.close()
    currentES = null
  }

  // 再接続タイマーをクリア
  if (reconnectTimer) {
    clearTimeout(reconnectTimer)
    reconnectTimer = null
  }

  const url = `/api/stream?session=${encodeURIComponent(sessionId)}${skipHistory ? '&skipHistory=1' : ''}`
  const es = new EventSource(url)
  currentES = es
  let firstMessage = true

  es.onopen = () => {
    // 接続成功時に再接続カウンターをリセット
    reconnectAttempts = 0
    lastHeartbeat = Date.now()
    if (currentSessionId === sessionId) {
      statusDot.className = 'connected'
      statusDot.textContent = ''
      updateUI()
    }
  }

  es.onmessage = e => {
    try {
      lastHeartbeat = Date.now()
      handleEvent(sessionId, JSON.parse(e.data))
      // skipHistoryでない場合のみ、最初のメッセージ受信時に自動スクロール
      if (!skipHistory && firstMessage && currentSessionId === sessionId) {
        firstMessage = false
        const ts = tabState[sessionId]
        if (ts) {
          ts.autoScroll = true
          // DOM描画完了を待ってからスクロール
          setTimeout(() => {
            ts.pane.scrollTop = ts.pane.scrollHeight
          }, 100)
        }
      }
    } catch {}
  }

  es.onerror = () => {
    handleDisconnection(sessionId, true)
  }
}

// 切断処理の共通化
function handleDisconnection(sessionId, isAutoReconnect = true) {
  if (currentSessionId !== sessionId) return

  // 切断状態を表示
  statusDot.className = 'disconnected'
  statusDot.textContent = '↻'

  // SSE切断時にサーバーの実行状態を確認してisRunningを補正
  fetch(`/api/status?session=${encodeURIComponent(sessionId)}`)
    .then(r => r.json())
    .then(data => {
      const ts = tabState[sessionId]
      if (!ts) return
      if (!data.running && ts.isRunning) {
        ts.isRunning = false
        updateUI()
      }
    })
    .catch(() => {})

  // 既存の接続をクローズ
  if (currentES) {
    currentES.close()
    currentES = null
  }

  // 自動再接続が有効な場合のみ再接続
  if (isAutoReconnect) {
    // 指数バックオフで再接続
    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY)
    reconnectAttempts++

    if (reconnectTimer) clearTimeout(reconnectTimer)
    reconnectTimer = setTimeout(() => {
      if (currentSessionId === sessionId) {
        connectSSE(sessionId, true)
      }
    }, delay)
  }
}

// 手動再接続（ステータスドットクリック時）
function manualReconnect() {
  if (!currentSessionId) return
  reconnectAttempts = 0
  connectSSE(currentSessionId, true)
}

// ── ネットワーク監視 ──
function startNetworkMonitoring() {
  // 1. ブラウザのオンライン/オフラインイベント監視
  window.addEventListener('online', () => {
    // オンライン復帰時は即座に再接続
    if (currentSessionId && (!currentES || currentES.readyState === EventSource.CLOSED)) {
      reconnectAttempts = 0
      connectSSE(currentSessionId, true)
    }
  })

  window.addEventListener('offline', () => {
    // オフライン時は切断状態を表示（自動再接続しない）
    if (currentSessionId) {
      handleDisconnection(currentSessionId, false)
    }
  })

  // 2. ページ表示復帰時の接続確認（バックグラウンドから復帰）
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentSessionId) {
      // ページ表示時に接続状態をチェック
      if (currentES && currentES.readyState === EventSource.CLOSED) {
        handleDisconnection(currentSessionId, true)
      } else if (!currentES) {
        // EventSourceが存在しない場合は再接続
        reconnectAttempts = 0
        connectSSE(currentSessionId, true)
      }
    }
  })

  // 3. 定期的なreadyStateチェック（5秒ごと）
  if (connectionCheckTimer) clearInterval(connectionCheckTimer)
  connectionCheckTimer = setInterval(() => {
    if (!currentSessionId || !currentES) return

    // EventSourceがCLOSED状態になっていれば切断処理
    if (currentES.readyState === EventSource.CLOSED) {
      handleDisconnection(currentSessionId, true)
    }
  }, 5000)
}

// ── ツール結果テキスト変換 ──
function resolveToolContent(content, toolUseResult) {
  if (Array.isArray(content)) {
    // Agent等: [{type:"text", text:"..."}, ...] → textブロックを結合
    const text = content.filter(b => b.type === 'text').map(b => b.text).join('\n')
    return text || '(no output)'
  }
  if (typeof content === 'string' && content !== '') return content
  // 空文字列のフォールバック（Bash出力なし等）
  return '(no output)'
}

// ── イベント処理 ──
function handleEvent(sessionId, ev) {
  const ts = tabState[sessionId]
  if (!ts) return
  const isActive = sessionId === currentSessionId

  switch (ev.type) {
    case 'user_input':
      if (ev.text && ev.text.trimStart().startsWith('<task-notification>')) {
        addLine(ts, `[notification] ${ev.text.replace(/<\/?task-notification>/g, '').trim()}`, 'line-system')
      } else {
        addLine(ts, `> ${ev.text}`, 'line-user')
        // 初回プロンプト時にタブタイトルを自動更新（'Claude Code'の場合のみ）
        const currentSession = loadSessions().find(s => s.sessionId === sessionId)
        if (currentSession && currentSession.name === 'Claude Code' && ev.text) {
          const newTitle = ev.text.substring(0, 30)
          updateSession(sessionId, { name: newTitle })
          const tabEl = tabBar.querySelector(`[data-session-id="${sessionId}"]`)
          if (tabEl) {
            const nameEl = tabEl.querySelector('.tab-name')
            if (nameEl) nameEl.textContent = newTitle
          }
        }
      }
      finalizeText(ts)
      break

    case 'user':
      // tool_resultを処理
      if (ev.message?.content) {
        ev.message.content.forEach(item => {
          if (item.type === 'tool_result') {
            const toolId = item.tool_use_id
            const toolEl = ts.pane.querySelector(`[data-tool-id="${toolId}"]`)
            if (toolEl && toolEl._resultDiv) {
              toolEl._resultDiv.textContent = resolveToolContent(item.content, ev.tool_use_result)
              // エラーの場合は色を変える
              if (item.is_error) {
                toolEl._resultDiv.style.color = 'var(--red)'
              }
            }
          }
        })
      }
      break

    case 'start':
      finalizeText(ts)
      ts.isRunning = true
      addLine(ts, `── ${ev.project} (${ev.model}) ──`, 'line-system')
      if (isActive) updateUI()
      break

    case 'stream_event': {
      const inner = ev.event
      switch (inner.type) {
        case 'content_block_start':
          finalizeText(ts)
          if (inner.content_block?.type === 'tool_use') {
            const toolName = inner.content_block.name || 'Tool'
            ts._currentToolEl = addToolLine(ts, toolName, inner.content_block.id)
            ts._currentToolInput = ''
            ts._currentBlockType = 'tool_use'
          } else if (inner.content_block?.type === 'thinking') {
            ts._thinkingEl = addLine(ts, '[thinking...]', 'line-thinking')
            ts._currentBlockType = 'thinking'
          } else {
            ts._currentBlockType = inner.content_block?.type || null
          }
          break
        case 'content_block_delta':
          if (inner.delta?.type === 'text_delta') appendText(ts, inner.delta.text)
          else if (inner.delta?.type === 'input_json_delta' && ts._currentToolEl) {
            ts._currentToolInput = (ts._currentToolInput || '') + (inner.delta.partial_json || '')
          }
          // thinking_delta は ts._thinkingEl があれば表示更新（省略可 — 長いので折りたたみ）
          break
        case 'content_block_stop':
          finalizeText(ts)
          if (ts._currentBlockType === 'tool_use') {
            if (ts._currentToolEl && ts._currentToolInput) {
              try {
                const params = JSON.parse(ts._currentToolInput)
                updateToolDesc(ts._currentToolEl, params)
              } catch {}
            }
            ts._currentToolEl = null
            ts._currentToolInput = ''
          } else if (ts._currentBlockType === 'thinking') {
            // thinkingブロック終了 → 表示を折りたたみ済みに変更
            if (ts._thinkingEl) ts._thinkingEl.textContent = '[thinking done]'
            ts._thinkingEl = null
          }
          ts._currentBlockType = null
          break
        case 'message_start':
          if (inner.message && inner.message.usage) {
            const u = inner.message.usage
            ts._ctxTokens = (u.input_tokens || 0) + (u.cache_creation_input_tokens || 0) + (u.cache_read_input_tokens || 0)
          }
          break
        case 'message_delta':
          if (inner.usage && inner.usage.output_tokens) {
            ts._ctxTokens += inner.usage.output_tokens
            if (isActive) {
              const pct = Math.round(ts._ctxTokens / CTX_MAX * 100)
              if (pct >= 50) updateCtxBadge(pct)
            }
          }
          break
      }
      break
    }

    case 'done': {
      finalizeText(ts)
      ts.isRunning = false
      const pct = Math.round(ts._ctxTokens / CTX_MAX * 100)
      const doneMsg = ev.reason === 'server_restart'
        ? `⚠ Interrupted (server restarted)`
        : `✓ Done (exit ${ev.exitCode}) — ${pct}%`
      const doneEl = addLine(ts, doneMsg, 'line-done')
      if (ev.reason === 'server_restart' || pct >= 50) doneEl.classList.add('warn')
      if (isActive) { updateCtxBadge(pct); updateUI() }
      break
    }

    case 'error':
      finalizeText(ts)
      ts.isRunning = false
      addLine(ts, `Error: ${ev.message}`, 'line-error')
      if (isActive) updateUI()
      break

    case 'system':
      addLine(ts, ev.text, 'line-system')
      break

    case 'stderr':
      if (ev.text?.trim()) addLine(ts, `[err] ${ev.text}`, 'line-system')
      break

    case 'raw':
      // rawイベントの中にJSONエンコードされたtool_resultが含まれる場合がある（Editツール等）
      if (ev.text) {
        try {
          const parsed = JSON.parse(ev.text)
          if (parsed.type === 'user' && parsed.message?.content) {
            parsed.message.content.forEach(item => {
              if (item.type === 'tool_result') {
                const toolId = item.tool_use_id
                const toolEl = ts.pane.querySelector(`[data-tool-id="${toolId}"]`)
                if (toolEl && toolEl._resultDiv) {
                  toolEl._resultDiv.textContent = resolveToolContent(item.content, parsed.tool_use_result)
                  if (item.is_error) {
                    toolEl._resultDiv.style.color = 'var(--red)'
                  }
                }
              }
            })
          }
        } catch {}
      }
      break
  }
}

function isAtBottom(pane, threshold = 100) {
  return pane.scrollHeight - pane.scrollTop - pane.clientHeight < threshold
}

function scrollToBottom(ts) {
  if (ts.autoScroll && tabState[currentSessionId] === ts) {
    requestAnimationFrame(() => {
      ts.pane.scrollTop = ts.pane.scrollHeight
    })
  }
}

function appendText(ts, text) {
  if (!ts.currentTextEl) {
    ts.currentTextEl = document.createElement('div')
    ts.currentTextEl.className = 'line line-text'
    ts.pane.appendChild(ts.currentTextEl)
    ts._rawText = ''
  }
  ts._rawText += text
  ts.currentTextEl.textContent = ts._rawText
  scrollToBottom(ts)
}

function finalizeText(ts) {
  if (ts.currentTextEl && ts._rawText) {
    ts.currentTextEl.innerHTML = marked.parse(ts._rawText)
    ts._rawText = ''
    // マークダウンレンダリングで高さが変わるので、autoScroll中なら追従
    scrollToBottom(ts)
  }
  ts.currentTextEl = null
}

function addLine(ts, text, cls) {
  const div = document.createElement('div')
  div.className = `line ${cls}`
  div.textContent = text
  ts.pane.appendChild(div)
  scrollToBottom(ts)
  return div
}

function addToolLine(ts, toolName, toolId) {
  const div = document.createElement('div')
  div.className = 'line line-tool'
  div.dataset.toolId = toolId

  const nameSpan = document.createElement('span')
  nameSpan.className = 'tool-name'
  nameSpan.textContent = `[${toolName}]`

  const descSpan = document.createElement('span')
  descSpan.className = 'tool-desc'
  descSpan.textContent = ''

  const toggleSpan = document.createElement('span')
  toggleSpan.className = 'tool-toggle'
  toggleSpan.textContent = '▸'

  div.appendChild(nameSpan)
  div.appendChild(descSpan)
  div.appendChild(toggleSpan)

  const resultDiv = document.createElement('div')
  resultDiv.className = 'tool-result'

  div.addEventListener('click', () => {
    const expanded = resultDiv.classList.toggle('expanded')
    toggleSpan.textContent = expanded ? '▾' : '▸'
  })

  ts.pane.appendChild(div)
  ts.pane.appendChild(resultDiv)

  div._resultDiv = resultDiv
  scrollToBottom(ts)
  return div
}

function updateToolDesc(toolEl, params) {
  const descSpan = toolEl.querySelector('.tool-desc')
  if (!descSpan) return

  const toolName = toolEl.querySelector('.tool-name')?.textContent.replace(/[\[\]]/g, '') || ''
  let desc = ''

  switch (toolName) {
    case 'Bash':
      desc = params.command ? params.command.substring(0, 60) : ''
      break
    case 'Read':
      desc = params.file_path ? params.file_path : ''
      break
    case 'Edit':
      desc = params.file_path ? params.file_path : ''
      break
    case 'Write':
      desc = params.file_path ? params.file_path : ''
      break
    case 'Grep':
      desc = params.pattern ? `"${params.pattern}"${params.path ? ' in ' + params.path : ''}` : ''
      break
    case 'Glob':
      desc = params.pattern ? params.pattern : ''
      break
    default:
      desc = Object.keys(params).slice(0, 2).map(k => `${k}: ${String(params[k]).substring(0, 30)}`).join(', ')
  }

  descSpan.textContent = desc
}

function updateCtxBadge(pct) {
  if (pct <= 0) { ctxBadge.textContent = ''; ctxBadge.className = ''; return }
  ctxBadge.textContent = `${pct}%`
  ctxBadge.className = pct >= 50 ? 'warn' : ''
}

// ── 履歴パネル ──
function formatDate(iso) {
  if (!iso) return ''
  const d = new Date(iso)
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
}

async function openHistory() {
  historyPanel.classList.add('open')
  historyBtn.classList.add('active')
  historyTitle.textContent = 'Conversation History'
  historyBack.onclick = closeHistory
  historyBody.innerHTML = '<div style="padding:20px;color:#666;font-size:13px;">Loading...</div>'

  try {
    const sessions = await fetch('/api/history').then(r => r.json())
    historyBody.innerHTML = ''
    if (sessions.length === 0) {
      historyBody.innerHTML = '<div style="padding:20px;color:#666;font-size:13px;">No history available</div>'
      return
    }
    for (const s of sessions) {
      const item = document.createElement('div')
      item.className = 'history-item'
      item.innerHTML = `
        <div class="history-item-title">${escapeHtml(s.title)}</div>
        <div class="history-item-meta">${formatDate(s.updatedAt)} · ${s.msgCount} messages</div>
      `
      item.addEventListener('click', () => openHistoryDetail(s))
      historyBody.appendChild(item)
    }
  } catch (e) {
    historyBody.innerHTML = `<div style="padding:20px;color:#EF5350;font-size:13px;">Error: ${e.message}</div>`
  }
}

async function openHistoryDetail(session) {
  historyTitle.textContent = formatDate(session.updatedAt)
  historyBack.onclick = openHistory
  historyBody.innerHTML = '<div style="padding:20px;color:#666;font-size:13px;">Loading...</div>'

  try {
    const msgs = await fetch(`/api/history/${encodeURIComponent(session.sessionId)}`).then(r => r.json())
    historyBody.innerHTML = ''
    if (msgs.length === 0) {
      historyBody.innerHTML = '<div style="padding:20px;color:#666;font-size:13px;">No messages</div>'
      return
    }
    for (const m of msgs) {
      const div = document.createElement('div')
      div.className = `history-msg ${m.role === 'user' ? 'history-msg-user' : 'history-msg-assistant'}`
      div.textContent = m.text
      historyBody.appendChild(div)
    }

    // 再開ボタン
    const resumeBtn = document.createElement('button')
    resumeBtn.id = 'resume-btn'
    resumeBtn.textContent = 'Resume this conversation'
    resumeBtn.addEventListener('click', () => resumeConversation(session.sessionId))
    historyBody.appendChild(resumeBtn)

    // 最下部にスクロール
    setTimeout(() => {
      historyBody.scrollTop = historyBody.scrollHeight
    }, 100)
  } catch (e) {
    historyBody.innerHTML = `<div style="padding:20px;color:#EF5350;font-size:13px;">Error: ${e.message}</div>`
  }
}

async function resumeConversation(sessionId) {
  try {
    // 全イベントを取得（logs/<sessionId>.jsonl から）
    const events = await fetch(`/api/history/${encodeURIComponent(sessionId)}/events`).then(r => r.json())

    // 既存セッションをチェック
    const sessions = loadSessions()
    let targetSession = sessions.find(s => s.sessionId === sessionId)

    if (!targetSession) {
      // タイトル取得（user_inputイベントから）
      const firstUserInput = events.find(e => e.type === 'user_input')
      const title = firstUserInput?.text?.substring(0, 30) || 'Resumed conversation'

      // 新規セッションとして作成
      const currentProj = getCurrentSession()?.project || Object.keys(_projectsCache)[0]
      targetSession = {
        sessionId,
        name: title,
        project: currentProj,
        lastUsed: Date.now()
      }
      sessions.push(targetSession)
      saveSessions(sessions)
      ensureTabState(targetSession)
      createTabEl(targetSession)

      // サーバーにマッピングを登録（pocket sessionId = Claude sessionId）
      await fetch('/api/register-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pocketSessionId: sessionId, claudeSessionId: sessionId })
      })
    }

    // loadHistoryBulk（connectSSE内）による二重描画を防ぐため先にフラグをセット
    const ts = tabState[sessionId]
    if (ts) ts._initialLoaded = true

    switchTab(sessionId)

    // 全イベントを再生（実セッションと同じ処理）
    for (const ev of events) {
      handleEvent(sessionId, ev)
    }

    // 最下部にスクロール
    if (ts) ts.autoScroll = true
    scrollToBottom(ts)

    closeHistory()
  } catch (e) {
    alert(`Resume error: ${e.message}`)
  }
}

function closeHistory() {
  historyPanel.classList.remove('open')
  historyBtn.classList.remove('active')
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

historyBtn.addEventListener('click', () => {
  if (historyPanel.classList.contains('open')) closeHistory()
  else openHistory()
})

// ── 送信 ──
async function send() {
  const prompt = promptEl.value.trim()
  if (!prompt) return
  const ts = getTS()
  const currentSession = getCurrentSession()
  if (!currentSession) return

  promptEl.value = ''
  promptEl.style.height = 'auto'
  // user_inputイベントで表示されるため、ここでは表示しない
  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt,
        sessionId: currentSessionId,
        project: currentSession.project,
        model: modelSel.value || null,
        effort: appSettings.effort || null
      })
    })
    if (!res.ok) {
      addLine(ts, `Send failed: ${(await res.json()).error}`, 'line-error')
    }
  } catch (e) {
    addLine(ts, `Network error: ${e.message}`, 'line-error')
  }
}

// ── ボタン ──
statusDot.addEventListener('click', () => {
  if (statusDot.classList.contains('disconnected')) {
    manualReconnect()
  }
})

stopBtn.addEventListener('click', () => {
  fetch('/api/stop', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session: currentSessionId }) })
})

addTabBtn.addEventListener('click', async () => {
  // デフォルトプロジェクト（★設定）を使う、なければ現在セッションを引き継ぐ
  const defaultProject = localStorage.getItem('pc-default-project')
  const project = (defaultProject && _projectsCache[defaultProject])
    ? defaultProject
    : (getCurrentSession()?.project || Object.keys(_projectsCache)[0])

  const newSession = {
    sessionId: crypto.randomUUID(),
    name: 'Claude Code',
    project,
    lastUsed: Date.now()
  }

  const sessions = loadSessions()
  sessions.push(newSession)
  saveSessions(sessions)

  ensureTabState(newSession)
  createTabEl(newSession)
  switchTab(newSession.sessionId)
})

sendBtn.addEventListener('click', send)
promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); send() }
})
promptEl.addEventListener('input', () => {
  const ts = getTS()
  promptEl.style.height = 'auto'
  promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px'
  updateLayout()

  // 入力フォームが拡大しても、自動スクロール中なら最下部を維持
  // レイアウト更新後に再度スクロール
  if (ts && ts.autoScroll) {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ts.pane.scrollTop = ts.pane.scrollHeight
      })
    })
  }
})

// ── レイアウト計算（visualViewport対応） ──
const topBarEl    = document.getElementById('top-bar')
const inputAreaEl = document.getElementById('input-area')

function updateLayout() {
  const vv = window.visualViewport
  const offsetTop = vv ? vv.offsetTop  : 0
  const vvHeight  = vv ? vv.height     : window.innerHeight

  topBarEl.style.top = offsetTop + 'px'

  const inputH = inputAreaEl.offsetHeight
  inputAreaEl.style.top    = (offsetTop + vvHeight - inputH) + 'px'
  inputAreaEl.style.bottom = 'auto'

  const topH = topBarEl.offsetHeight
  outputCont.style.top    = (offsetTop + topH) + 'px'
  outputCont.style.height = (vvHeight - topH - inputH) + 'px'
  outputCont.style.bottom = 'auto'
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateLayout)
  window.visualViewport.addEventListener('scroll', updateLayout)
}
const ro = new ResizeObserver(updateLayout)
ro.observe(topBarEl)
ro.observe(inputAreaEl)
updateLayout()

init()
</script>
</body>
</html>
